<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Комнаты</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>
    <h1>Список переговорных</h1>
    <nav>
        <a href="index.html">Главная</a>
        <a href="rooms.html">Комнаты</a>
        <a href="bookings.html">Мои брони</a>
    </nav>
</header>

<main>
    <section class="room-section">
        <h2>Доступные комнаты</h2>
        <div id="rooms" class="room-grid"></div>
    </section>

    <section class="booking-form-section">
        <h2>Создать бронь</h2>
        <form id="bookingForm">
            <label for="roomSelect">Комната:</label>
            <select id="roomSelect" required></select>

            <label for="startTime">Начало:</label>
            <input type="datetime-local" id="startTime" required>

            <label for="endTime">Конец:</label>
            <input type="datetime-local" id="endTime" required>

            <label for="purpose">Цель:</label>
            <input type="text" id="purpose" required>

            <button type="submit" class="btn">Забронировать</button>
        </form>
        <div id="bookingMessage"></div>
    </section>
</main>

<script src="js/rooms.js"></script>
</body>
</html>
